<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>GUILTY? — Jouer</title>
<link rel="stylesheet" href="/style.css">
<style>
  * { -webkit-tap-highlight-color: transparent; }

  body {
    display: flex; flex-direction: column;
    max-width: 520px; margin: 0 auto;
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; align-items: center;
            padding: 12px 14px; width: 100%; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── WAITING ── */
  #s-waiting {
    justify-content: center; align-items: center;
    text-align: center; gap: 20px;
  }
  .wait-avatar {
    width: 140px; height: 178px; border-radius: 12px;
    object-fit: cover; border: 3px solid var(--red);
    box-shadow: 0 0 30px rgba(192,57,43,.4);
  }
  .wait-name { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; }
  .wait-dots span {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--gold); margin: 0 3px;
    animation: bounce .9s infinite;
  }
  .wait-dots span:nth-child(2){ animation-delay:.15s; }
  .wait-dots span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* ── QUESTION ── */
  #s-question { gap: 10px; justify-content: flex-start; }

  .topbar {
    width: 100%; display: flex; align-items: center;
    justify-content: space-between; padding: 4px 0;
  }
  .my-info { display: flex; align-items: center; gap: 8px; }
  .my-av   { width: 34px; height: 34px; border-radius: 6px;
             object-fit: cover; border: 2px solid var(--red); }
  .my-nick { font-weight: 700; font-size: .85rem;
             max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .my-score-disp { font-family:'Bebas Neue',sans-serif; font-size: 1.2rem; color: var(--gold); }
  .q-num { font-size: .8rem; color: var(--gray); }

  /* Celebrity row */
  .celeb-row {
    width: 100%; display: flex; align-items: flex-start; gap: 12px;
    background: var(--bg2); border-radius: 10px; padding: 10px;
    border: 1px solid #ddd;
  }
  .polaroid-xs {
    background: #f5f0e8; padding: 6px 6px 22px;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    transform: rotate(-2deg); flex-shrink: 0;
    position: relative; width: 88px;
  }
  .polaroid-xs img { width: 76px; height: 76px; object-fit: cover; display: block; }
  .polaroid-xs .stamp {
    position: absolute; top: 6px; right: 3px;
    font-family: 'Bebas Neue',sans-serif; font-size: .75rem;
    color: var(--red); border: 1.5px solid var(--red);
    padding: 1px 4px; transform: rotate(12deg);
    opacity: .9; letter-spacing: 2px;
  }
  .celeb-info { flex: 1; min-width: 0; }
  .celeb-name { font-family:'Bebas Neue',sans-serif; font-size: 1.3rem;
                letter-spacing: 1px; line-height: 1.1; }
  .q-text     { font-size: .85rem; font-weight: 500; line-height: 1.4;
                margin-top: 6px; color: #ddd; }

  /* Timer row */
  .timer-row {
    width: 100%; display: flex; align-items: center; gap: 12px;
  }
  .answered-box {
    flex: 1; background: var(--bg3); border-radius: 8px;
    padding: 10px 12px; font-size: .88rem; color: var(--gray);
    display: none; line-height: 1.4;
  }

  /* Answer buttons */
  .ans-grid {
    width: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ans-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px;
    height: 76px;
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem; font-weight: 700;
    color: #fff; cursor: pointer;
    text-align: left; line-height: 1.2;
    transition: transform .1s, filter .15s;
    -webkit-tap-highlight-color: rgba(255,255,255,.1);
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  .ans-btn:active:not(:disabled) { transform: scale(.96); }
  .ans-btn:disabled { cursor: default; opacity: .7; }
  .ans-btn .shape { font-size: 1.2rem; flex-shrink: 0; }
  .ans-btn .ans-text { flex: 1; }
  .ans-btn.A { background: #e74c3c; }
  .ans-btn.B { background: #2980b9; }
  .ans-btn.C { background: #e67e22; }
  .ans-btn.D { background: #27ae60; }
  .ans-btn.correct   { outline: 4px solid #2ecc71; filter: brightness(1.15); }
  .ans-btn.wrong     { filter: brightness(.35) saturate(.3); }

  /* ── REVEAL ── */
  #s-reveal {
    justify-content: center; text-align: center; gap: 16px;
    padding-top: 40px;
  }
  .res-icon  { font-size: 5rem; }
  .res-title { font-family:'Bebas Neue',sans-serif; font-size: 2.5rem; letter-spacing: 2px; }
  .res-pts   { font-family:'Bebas Neue',sans-serif; font-size: 3.5rem; }
  .fact-box  {
    background: var(--bg3); border-left: 3px solid var(--red);
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: .88rem; color: #ccc; text-align: left; line-height: 1.5;
    width: 100%; max-width: 440px;
  }

  /* ── LEADERBOARD ── */
  #s-leaderboard { gap: 12px; }
  #s-leaderboard .lb-title {
    font-family:'Bebas Neue',sans-serif; font-size: 2rem;
    letter-spacing: 2px; width: 100%; text-align: center;
  }

  /* ── GAMEOVER ── */
  #s-gameover {
    justify-content: center; text-align: center; gap: 18px;
    padding-top: 40px;
  }
  .go-logo  { font-family:'Bebas Neue',sans-serif; font-size: 3rem;
              color: var(--red); letter-spacing: 3px; }
  .go-rank  { font-family:'Bebas Neue',sans-serif; font-size: 1.3rem; color: var(--gray); }
  .go-score { font-family:'Bebas Neue',sans-serif; font-size: 4rem; color: var(--gold); }
  .go-trophy { font-size: 4rem; }

  /* ── ERROR ── */
  #s-error { justify-content: center; text-align: center; gap: 16px; }
</style>
</head>
<body>

<!-- ══ WAITING ══ -->
<div id="s-waiting" class="screen active">
  <img id="w-avatar" class="wait-avatar" src="" alt="">
  <div class="wait-name" id="w-name"></div>
  <div style="color:var(--gray);">En attente du host…</div>
  <div class="wait-dots"><span></span><span></span><span></span></div>
</div>

<!-- ══ QUESTION ══ -->
<div id="s-question" class="screen">

  <div class="topbar">
    <div class="my-info">
      <img id="q-av" class="my-av" src="" alt="">
      <span id="q-nick" class="my-nick"></span>
    </div>
    <span id="q-num" class="q-num">Q 1/20</span>
    <span id="q-score" class="my-score-disp">0 pts</span>
  </div>

  <div class="celeb-row">
    <div class="polaroid-xs">
      <img id="celeb-img" src="" alt="">
      <div class="stamp">ACCUSED</div>
    </div>
    <div class="celeb-info">
      <div id="celeb-name" class="celeb-name"></div>
      <div id="q-text" class="q-text"></div>
    </div>
  </div>

  <div class="timer-row">
    <div class="timer-wrap" style="width:70px;height:70px;flex-shrink:0;">
      <svg width="70" height="70" viewBox="0 0 80 80">
        <circle class="timer-track" cx="40" cy="40" r="35"/>
        <circle id="t-fill" class="timer-fill" cx="40" cy="40" r="35"/>
      </svg>
      <div id="t-num" class="timer-num" style="font-size:1.4rem;">20</div>
    </div>
    <div id="ans-box" class="answered-box"></div>
  </div>

  <div class="ans-grid">
    <button class="ans-btn A" data-idx="0"><span class="shape">▲</span><span class="ans-text"></span></button>
    <button class="ans-btn B" data-idx="1"><span class="shape">◆</span><span class="ans-text"></span></button>
    <button class="ans-btn C" data-idx="2"><span class="shape">●</span><span class="ans-text"></span></button>
    <button class="ans-btn D" data-idx="3"><span class="shape">■</span><span class="ans-text"></span></button>
  </div>

</div>

<!-- ══ REVEAL ══ -->
<div id="s-reveal" class="screen">
  <div id="res-icon"    class="res-icon"></div>
  <div id="res-title"   class="res-title"></div>
  <div id="res-pts"     class="res-pts score-pop"></div>
  <div id="res-correct" style="
    background:#e8f8ee; border:2px solid #27ae60; border-radius:10px;
    padding:12px 18px; font-size:1rem; line-height:1.5;
    width:100%; max-width:440px; text-align:center;
  "></div>
  <div id="res-fact"    class="fact-box"></div>
  <p style="color:var(--gray);font-size:.8rem;">Prochaine question bientôt…</p>
</div>

<!-- ══ LEADERBOARD ══ -->
<div id="s-leaderboard" class="screen">
  <div class="lb-title">🏆 Classement</div>
  <div id="lb-rows" style="width:100%;"></div>
</div>

<!-- ══ GAMEOVER ══ -->
<div id="s-gameover" class="screen">
  <canvas id="confetti" class="confetti-canvas"></canvas>
  <div class="go-logo">GUILTY?</div>
  <div class="tag bebas">PARTIE TERMINÉE</div>
  <div id="go-trophy" class="go-trophy"></div>
  <div id="go-rank"   class="go-rank"></div>
  <div id="go-score"  class="go-score"></div>
  <div id="go-lb"     style="width:100%;margin-top:8px;"></div>
</div>

<!-- ══ ERROR ══ -->
<div id="s-error" class="screen">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--red);">GUILTY?</div>
  <div style="font-size:2.5rem;">😕</div>
  <p id="err-txt" style="color:var(--gray);"></p>
  <a href="/join" class="btn btn-red" style="text-decoration:none;margin-top:8px;">Rejoindre</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const myNickname = sessionStorage.getItem('gq_nickname');
const myAvatarId = sessionStorage.getItem('gq_avatarId');
let myScore      = parseInt(sessionStorage.getItem('gq_score') || '0');

// Per-question state — tout resetté dans question_start
let currentQId      = null;
let myAnswered      = false;
let myLastAnswer    = null;  // index cliqué, ou null si pas répondu
let myLastPoints    = 0;
let currentTimeLeft = 20;

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const SCREENS = ['waiting','question','reveal','leaderboard','gameover','error'];
function show(name) {
  SCREENS.forEach(s => {
    const el = document.getElementById('s-' + s);
    if (el) el.classList.toggle('active', s === name);
  });
}

const CIRC    = 2 * Math.PI * 35;  // r=35
const tFill   = document.getElementById('t-fill');
const tNum    = document.getElementById('t-num');
tFill.style.strokeDasharray = CIRC;

function setTimer(t) {
  tFill.style.strokeDashoffset = CIRC * (1 - Math.max(0,t) / 20);
  tNum.textContent = Math.max(0, t);
  const urgent = t <= 5;
  tFill.classList.toggle('urgent', urgent);
  tNum.classList.toggle('urgent', urgent);
}

function enableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = false;
    b.classList.remove('correct', 'wrong');
    b.style.opacity = '';
  });
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = true; });
}

function markButtons(correctIndex) {
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    if (i === correctIndex) b.classList.add('correct');
    else                    b.classList.add('wrong');
  });
}

let _avatarList = [];
function avatarUrl(id) {
  const av = _avatarList.find(a => a.id === id);
  return av ? `/avatars/${av.file}` : '';
}

function renderLb(list, containerId) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  list.forEach(p => {
    const row = document.createElement('div');
    row.className = 'lb-row fade-in' + (p.rank <= 3 ? ` rank-${p.rank}` : '');
    row.innerHTML = `
      <span class="lb-rank">${medals[p.rank-1] || p.rank}</span>
      <img class="lb-avatar" src="${avatarUrl(p.avatarId)}" alt="" onerror="this.style.display='none'">
      <span class="lb-name">${p.nickname}</span>
      <span class="lb-score">${p.score} pts</span>`;
    c.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
if (!myNickname || !myAvatarId) {
  show('error');
  document.getElementById('err-txt').textContent = 'Session introuvable. Rejoins la partie.';
} else {
  document.getElementById('w-name').textContent = myNickname;
  document.getElementById('q-nick').textContent = myNickname;

  fetch('/api/avatars').then(r => r.json()).then(d => {
    _avatarList = d.avatars;
    const av = d.avatars.find(a => a.id === myAvatarId);
    if (av) {
      document.getElementById('w-avatar').src = `/avatars/${av.file}`;
      document.getElementById('q-av').src     = `/avatars/${av.file}`;
    }
  });
}

// ═══════════════════════════════════════════════════════
//  SOCKET
// ═══════════════════════════════════════════════════════
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  if (myNickname && myAvatarId) {
    socket.emit('rejoin', { nickname: myNickname, avatarId: myAvatarId });
  }
});

socket.on('rejoin_success', ({ score, phase }) => {
  myScore = score;
  document.getElementById('q-score').textContent = score + ' pts';
  if (phase === 'waiting')  show('waiting');
  if (phase === 'gameover') { /* game_over event follows */ }
  // phase === 'question' → question_start event follows
});

socket.on('join_error', ({ message }) => {
  show('error');
  document.getElementById('err-txt').textContent = message;
});

// ── Game flow ─────────────────────────────────────────
socket.on('game_start', () => show('waiting'));

let currentOptions = [];

socket.on('question_start', ({ id, index, total, celebrity, question, options, photoUrl }) => {
  // RESET complet de l'état question
  currentQId      = id;
  myAnswered      = false;
  myLastAnswer    = null;
  myLastPoints    = 0;
  currentTimeLeft = 20;
  currentOptions  = options;

  // UI
  document.getElementById('q-num').textContent   = `Q ${index + 1}/${total}`;
  document.getElementById('q-score').textContent = myScore + ' pts';
  document.getElementById('celeb-name').textContent = celebrity;
  document.getElementById('q-text').textContent     = question;

  const img = document.getElementById('celeb-img');
  img.src = photoUrl || '';

  const opts = document.querySelectorAll('.ans-btn');
  opts.forEach((b, i) => {
    b.querySelector('.ans-text').textContent = options[i];
  });

  // Réactiver les boutons proprement
  enableButtons();

  // Masquer le message "répondu"
  const box = document.getElementById('ans-box');
  box.style.display = 'none';
  box.innerHTML = '';

  setTimer(20);
  show('question');
});

socket.on('timer_tick', ({ timeLeft }) => {
  currentTimeLeft = timeLeft;
  setTimer(timeLeft);
  if (timeLeft <= 0 && !myAnswered) {
    myAnswered = true;
    disableButtons();
    const box = document.getElementById('ans-box');
    box.innerHTML = '⏰ <strong>Temps écoulé !</strong><br><small>En attente du résultat…</small>';
    box.style.display = 'block';
  }
});

socket.on('already_answered', () => {
  myAnswered = true;
  disableButtons();
});

socket.on('answer_received', ({ correct, points }) => {
  myLastPoints = points;
});

socket.on('question_end', ({ correctIndex, fact, scores }) => {
  // ── 1. Afficher la bonne réponse sur les boutons ──
  markButtons(correctIndex);

  // Mettre à jour le score
  const me = scores.find(p => p.nickname === myNickname);
  if (me) { myScore = me.score; sessionStorage.setItem('gq_score', myScore); }

  // ── 2. Après 5s : écran de révélation ──
  setTimeout(() => {
    const wasCorrect  = myLastAnswer !== null && myLastAnswer === correctIndex;
    const correctText = currentOptions[correctIndex] || '';

    document.getElementById('res-icon').textContent  = wasCorrect ? '✅' : '❌';
    document.getElementById('res-title').textContent = wasCorrect ? 'CORRECT !' : 'FAUX…';
    document.getElementById('res-pts').textContent   = myLastPoints > 0 ? `+${myLastPoints} pts` : '0 pt';
    document.getElementById('res-pts').style.color   = myLastPoints > 0 ? 'var(--gold)' : 'var(--red2)';

    // Bonne réponse en vert bien visible
    document.getElementById('res-correct').innerHTML =
      `<span style="color:#27ae60;font-weight:700;">✅ Bonne réponse :</span><br>${correctText}`;

    document.getElementById('res-fact').textContent = fact;

    show('reveal');

    // ── 3. Classement après 6s ──
    setTimeout(() => {
      renderLb(scores, 'lb-rows');
      show('leaderboard');
    }, 6000);
  }, 5000);
});

socket.on('game_over', ({ leaderboard }) => {
  const me    = leaderboard.find(p => p.nickname === myNickname);
  const rank  = me?.rank ?? '?';
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('go-trophy').textContent = medals[rank-1] || '🎖️';
  document.getElementById('go-rank').textContent   = `Classement final : #${rank}`;
  document.getElementById('go-score').textContent  = (me?.score ?? myScore) + ' pts';
  renderLb(leaderboard.slice(0, 10), 'go-lb');
  show('gameover');
  if (rank <= 3) launchConfetti();
});

socket.on('game_reset', () => {
  sessionStorage.clear();
  window.location.href = '/join';
});

// ═══════════════════════════════════════════════════════
//  ANSWER BUTTONS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.ans-btn').forEach(btn => {
  // Support tactile + souris
  ['click', 'touchend'].forEach(evt => {
    btn.addEventListener(evt, e => {
      if (evt === 'touchend') e.preventDefault();
      if (myAnswered || btn.disabled) return;

      const idx    = parseInt(btn.dataset.idx);
      myAnswered   = true;
      myLastAnswer = idx;

      socket.emit('submit_answer', {
        questionId:  currentQId,
        answerIndex: idx,
        timeLeft:    currentTimeLeft
      });

      // Visuellement : griser tous sauf celui choisi
      document.querySelectorAll('.ans-btn').forEach((b, i) => {
        b.disabled = true;
        if (i !== idx) b.classList.add('wrong');
      });

      const box = document.getElementById('ans-box');
      box.innerHTML = '✅ <strong>Réponse envoyée !</strong><br><small>En attente des autres…</small>';
      box.style.display = 'block';
    }, { passive: false });
  });
});

// ═══════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const P = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width, y: -20,
    w: Math.random()*12+4, h: Math.random()*6+3,
    c: ['#f1c40f','#c0392b','#3498db','#2ecc71','#9b59b6'][Math.floor(Math.random()*5)],
    vy: Math.random()*3+2, vx: (Math.random()-.5)*2,
    r: Math.random()*360, dr: (Math.random()-.5)*4
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    P.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.r+=p.dr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}
    });
    if(++f<300) requestAnimationFrame(draw);
    else canvas.style.display='none';
  })();
}
</script>
</body>
</html>
