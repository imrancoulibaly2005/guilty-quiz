<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎵 Blind Test — Vue Salle</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── JOIN SCREEN ── -->
<div class="screen active" id="screenJoin">
  <div class="logo">🎵 Blind Test</div>
  <div class="logo-sub">Vue Salle</div>
  <div class="card">
    <div class="flex flex-col" style="gap:16px">
      <div>
        <label>Code de la salle</label>
        <input type="text" id="inputCode" placeholder="Ex: XKPQ" maxlength="4"
          style="text-transform:uppercase;letter-spacing:.15em">
      </div>
      <button class="btn btn-primary btn-full" id="btnJoin">Rejoindre</button>
      <div id="joinError" class="text-sm" style="color:#FF3860;text-align:center;display:none"></div>
    </div>
  </div>
</div>

<!-- ── HOST MIRROR (no title, no controls) ── -->
<div class="screen" id="screenDisplay">
  <div class="round-banner" id="dispRoundBanner">En attente…</div>
  <div class="category-badge" id="dispCategoryBadge"></div>

  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar-fill" id="dispTimerFill" style="width:100%"></div></div>
    <div class="timer-label" id="dispTimerLabel">30</div>
  </div>

  <!-- Buzz list -->
  <div class="card card-wide">
    <div class="bangers text-magenta" style="font-size:1.1rem;margin-bottom:12px">Buzzeurs</div>
    <div class="buzz-list" id="dispBuzzList">
      <div class="text-dim text-sm">Personne n'a buzzé</div>
    </div>
  </div>

  <!-- Buzz name display (same as host) -->
  <div id="dispBuzzNameWrap" style="display:none;width:100%;max-width:480px">
    <div class="buzz-name-display" id="dispBuzzNameDisplay"></div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="dispScoreboard"></div>
</div>

<!-- ── REVEAL ── -->
<div class="screen" id="screenReveal">
  <div class="bangers text-cyan" style="font-size:1.4rem" id="dispRevealFoundLabel">🎯 Trouvé !</div>
  <div class="song-title-reveal" id="dispRevealTitle"></div>
  <div class="category-badge" id="dispRevealCategory"></div>
  <div class="scoreboard" id="dispRevealScoreboard"></div>
  <div class="text-dim text-sm text-center" id="dispRevealNext">Prochaine manche<span class="waiting-dots"></span></div>
</div>

<!-- ── PODIUM ── -->
<div class="screen" id="screenPodium">
  <div class="logo" style="font-size:2.5rem;margin-bottom:4px">🏆 Podium</div>
  <div class="podium-wrap" id="dispPodiumBlocks"></div>
  <div class="scoreboard card-wide" id="dispPodiumRanking" style="max-width:500px"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const ROUND_DURATION = 30;
let socket, currentRoundLabel = '';

function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Auto-join from URL ────────────────────────────────────
const params = new URLSearchParams(location.search);
const autoRoom = params.get('room');
if (autoRoom) {
  window.addEventListener('load', () => {
    $('inputCode').value = autoRoom.toUpperCase();
    joinRoom(autoRoom.toUpperCase());
  });
}

$('btnJoin').addEventListener('click', () => {
  joinRoom($('inputCode').value.trim().toUpperCase());
});
$('inputCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom($('inputCode').value.trim().toUpperCase());
});

function joinRoom(code) {
  if (!code) return;
  $('joinError').style.display = 'none';
  socket = io();

  socket.on('error', err => {
    $('joinError').textContent = err.message;
    $('joinError').style.display = 'block';
    socket.disconnect();
  });

  socket.emit('join_display', { roomCode: code });

  socket.on('display_joined', data => {
    showScreen('screenDisplay');
    if (data.scores) renderScoreboard('dispScoreboard', data.scores, null);
    if (data.category) $('dispCategoryBadge').textContent = data.category;
    if (data.timeLeft != null) setTimer(data.timeLeft);
  });

  socket.on('game_started', data => {
    currentRoundLabel = `Manche ${data.songIndex} / ${data.total}`;
    $('dispRoundBanner').textContent   = currentRoundLabel;
    $('dispCategoryBadge').textContent = data.category;
    setTimer(ROUND_DURATION);
    renderBuzzList([], null);
    renderScoreboard('dispScoreboard', data.scores, currentRoundLabel);
    showScreen('screenDisplay');
  });

  socket.on('timer_tick', ({ timeLeft }) => setTimer(timeLeft));

  socket.on('player_buzzed', ({ buzzOrder, activeBuzzerId }) => {
    renderBuzzList(buzzOrder, activeBuzzerId);
  });

  socket.on('score_update', ({ scores }) => {
    renderScoreboard('dispScoreboard', scores, currentRoundLabel);
  });

  socket.on('song_revealed', ({ correctTitle, category, found, scores }) => {
    $('dispRevealFoundLabel').textContent = found ? '🎯 Trouvé !' : '⏱️ Pas trouvé…';
    $('dispRevealTitle').textContent      = correctTitle;
    $('dispRevealCategory').textContent   = category;
    renderScoreboard('dispRevealScoreboard', scores, currentRoundLabel);
    $('dispRevealNext').style.display = 'block';
    showScreen('screenReveal');
  });

  socket.on('game_over', ({ podium }) => {
    renderPodium(podium);
    showScreen('screenPodium');
  });
}

// ── Timer ─────────────────────────────────────────────────
function setTimer(t) {
  $('dispTimerLabel').textContent = t;
  const pct = Math.round((t / ROUND_DURATION) * 100);
  const fill = $('dispTimerFill');
  fill.style.width = pct + '%';
  fill.className = 'timer-bar-fill' + (t <= 10 ? ' danger' : '');
}

// ── Buzz list (same logic as host renderBuzzList) ─────────
function renderBuzzList(buzzOrder, activeBuzzerId) {
  const el = $('dispBuzzList');
  const wrap = $('dispBuzzNameWrap');

  if (!buzzOrder || buzzOrder.length === 0) {
    el.innerHTML = '<div class="text-dim text-sm">Personne n\'a buzzé</div>';
    wrap.style.display = 'none';
    return;
  }

  el.innerHTML = buzzOrder.map((p, i) => {
    const active = p.playerId === activeBuzzerId;
    return `<div class="buzz-item ${active ? 'active-buzz' : ''}">
      <div class="buzz-rank">${i + 1}.</div>
      <div class="player-dot" style="background:${p.color}"></div>
      <div style="font-weight:600;color:${p.color}">${escHtml(p.pseudo)}</div>
      <div class="buzz-pts">+${p.pointsIfCorrect} pts</div>
    </div>`;
  }).join('');

  if (activeBuzzerId) {
    const active = buzzOrder.find(p => p.playerId === activeBuzzerId);
    if (active) {
      const nd = $('dispBuzzNameDisplay');
      nd.style.color = active.color;
      nd.innerHTML =
        `<div class="buzz-name-pseudo" style="color:${active.color}">${escHtml(active.pseudo)}</div>` +
        `<div class="buzz-name-pts">⚡ +${active.pointsIfCorrect} pts</div>`;
      nd.style.animation = 'none';
      void nd.offsetWidth;
      nd.style.animation = '';
    }
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
}

// ── Scoreboard ────────────────────────────────────────────
function rankLabel(i) {
  return i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
}

function renderScoreboard(containerId, scores, roundLabel) {
  const el = $(containerId);
  if (!el) return;
  const header = roundLabel
    ? `<div class="scoreboard-header"><span>🎵 ${roundLabel}</span><span style="color:var(--dim);font-size:.9rem">Score</span></div>`
    : '<div class="scoreboard-header"><span>Classement</span><span style="color:var(--dim);font-size:.9rem">Score</span></div>';
  const rows = scores.map((p, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const delta = p.delta && p.delta !== 0
      ? `<span class="delta-badge ${p.delta > 0 ? 'delta-pos' : 'delta-neg'}">${p.delta > 0 ? '+' : ''}${p.delta}</span>`
      : '';
    return `<div class="score-row">
      <div class="score-rank ${rankClass}">${rankLabel(i)}</div>
      <div class="score-pseudo" style="color:${p.color}">${escHtml(p.pseudo)}</div>
      <div class="score-pts">${p.score} pts</div>
      ${delta}
    </div>`;
  }).join('');
  el.innerHTML = header + rows;
}

// ── Podium ────────────────────────────────────────────────
function renderPodium(podium) {
  const wrap = $('dispPodiumBlocks');
  const heights = [220, 300, 160];
  const colors  = ['#C0C0C0', '#FFD600', '#CD7F32'];
  const medals  = ['🥈', '🥇', '🥉'];
  const order   = [1, 0, 2];
  wrap.innerHTML = order.map(i => {
    const p = podium[i];
    if (!p) return '';
    return `<div class="podium-block">
      <div class="podium-name" style="color:${p.color}">${escHtml(p.pseudo)}</div>
      <div class="podium-score">${p.score} pts</div>
      <div class="podium-bar" style="height:${heights[i]}px;background:${colors[i]}">${medals[i]}</div>
    </div>`;
  }).join('');

  const full = $('dispPodiumRanking');
  full.innerHTML = '<div class="scoreboard-header"><span>Classement complet</span></div>' +
    podium.map((p, i) =>
      `<div class="score-row">
        <div class="score-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${rankLabel(i)}</div>
        <div class="score-pseudo" style="color:${p.color}">${escHtml(p.pseudo)}</div>
        <div class="score-pts">${p.score} pts</div>
      </div>`
    ).join('');
}
</script>
</body>
</html>
